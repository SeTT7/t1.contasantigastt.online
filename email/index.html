<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carregando...</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #0f0f0f;
      font-family: sans-serif;
      color: #fff;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Aguarde, redirecionando...</p>
  </div>

  <script>
    setTimeout(() => {
      fetch("https://goextravitalityhubshoptesteredirect.endersonset11.workers.dev/", { method: "POST" })
        .then(r => r.json())
        .then(data => {
          window.location.href = data.url;
        });
    }, 800);
  </script>
</body>
</html>
